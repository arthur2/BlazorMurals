<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorMurals</title>
    <base href="/" />

    <!-- Theme boot script: uses localStorage('theme') first, otherwise reads appsettings.json -->
    <script>
        (function () {
            function applyTheme(t) {
                if (!t) return;
                t = String(t).toLowerCase();
                document.documentElement.classList.remove('theme-light', 'theme-dark');
                document.documentElement.classList.add('theme-' + t);
                document.documentElement.setAttribute('data-theme', t);
            }

            try {
                var stored = localStorage.getItem('theme');
                if (stored) {
                    applyTheme(stored);
                } else {
                    fetch('./appsettings.json')
                        .then(function (r) { return r.json(); })
                        .then(function (cfg) {
                            var theme = (cfg && cfg.Theme) ? cfg.Theme : 'light';
                            applyTheme(theme);
                        })
                        .catch(function () { applyTheme('light'); });
                }
            } catch (e) {
                // If anything goes wrong, default to light
                applyTheme('light');
            }
        })();
    </script>

    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorMurals.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
